name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set base path (custom domain = /, else /<repo>/)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CNAME=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages" | jq -r '.cname // empty')
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ -n "$CNAME" ] || [[ "$REPO_NAME" == *.github.io ]]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi
          echo "Base path: ${CNAME:+custom domain $CNAME → }/$([ -z "$CNAME" ] && [[ "$REPO_NAME" != *.github.io ]] && echo "$REPO_NAME/")"

      - name: Build
        run: bun run build

      - name: SPA fallback for deep links
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
